<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day 294 - User Profile Card</title>

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #e2e8f0;
    }

    /* Card */
    .profile-card {
      width: 100%;
      max-width: 380px;
      background: #0a1628;
      border: 1px solid #1e293b;
      border-radius: 20px;
      overflow: hidden;
    }

    /* Cover banner */
    .cover {
      height: 100px;
      background: linear-gradient(135deg, #0c2340 0%, #0e3460 50%, #1a4a7a 100%);
      position: relative;
    }

    .cover-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.15;
      background-image:
        radial-gradient(circle at 20% 50%, #38bdf8 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, #38bdf8 0%, transparent 40%);
    }

    /* Avatar */
    .avatar-wrap {
      position: absolute;
      bottom: -36px;
      left: 24px;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      border: 3px solid #0a1628;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: #0f172a;
    }

    .status-dot {
      width: 13px;
      height: 13px;
      background: #22c55e;
      border: 2px solid #0a1628;
      border-radius: 50%;
      position: absolute;
      bottom: 3px;
      right: 3px;
    }

    /* Body */
    .card-body {
      padding: 48px 24px 24px;
    }

    /* Name row */
    .name-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .user-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: #f8fafc;
    }

    .verified {
      width: 18px;
      height: 18px;
      background: #38bdf8;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.55rem;
      color: #0f172a;
      font-weight: 700;
    }

    .user-role {
      font-size: 0.825rem;
      color: #64748b;
      margin-bottom: 6px;
    }

    .user-location {
      font-size: 0.78rem;
      color: #475569;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 16px;
    }

    .user-location::before {
      content: '📍';
      font-size: 0.75rem;
    }

    /* Bio */
    .user-bio {
      font-size: 0.825rem;
      color: #64748b;
      line-height: 1.65;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #1e293b;
    }

    /* Stats row */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #1e293b;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .stat-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: #f8fafc;
    }

    .stat-label {
      font-size: 0.7rem;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* Badges */
    .badges-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #475569;
      margin-bottom: 10px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 22px;
    }

    .badge {
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      border: 1px solid transparent;
    }

    .badge.blue   { background: #0c2340; color: #38bdf8; border-color: #1e3a5f; }
    .badge.green  { background: #052e16; color: #34d399; border-color: #166534; }
    .badge.purple { background: #1e0a3c; color: #a78bfa; border-color: #3b1a6e; }
    .badge.orange { background: #2d1200; color: #fb923c; border-color: #7c2d12; }
    .badge.pink   { background: #2d0a1e; color: #f472b6; border-color: #831843; }

    /* Action buttons */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 0.825rem;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      border: none;
      transition: background 0.2s, color 0.2s;
    }

    .btn-primary {
      background: #38bdf8;
      color: #0f172a;
    }

    .btn-primary:hover {
      background: #0ea5e9;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #1e293b;
      color: #94a3b8;
    }

    .btn-outline:hover {
      background: #1e293b;
      color: #e2e8f0;
    }
  </style>
</head>
<body>

  <div class="profile-card">

    <!-- Cover -->
    <div class="cover">
      <div class="cover-pattern"></div>
      <div class="avatar-wrap">
        <div class="avatar">SK</div>
        <div class="status-dot"></div>
      </div>
    </div>

    <!-- Body -->
    <div class="card-body">

      <div class="name-row">
        <span class="user-name">Subham Kumar</span>
        <span class="verified">✓</span>
      </div>
      <p class="user-role">Frontend Developer · Freelancer</p>
      <p class="user-location">Odisha, India</p>

      <p class="user-bio">
        Building production-ready UI components daily. Focused on clean design systems, scalable frontends, and delivering real value to clients.
      </p>

      <!-- Stats -->
      <div class="stats">
        <div class="stat">
          <span class="stat-value">294</span>
          <span class="stat-label">Days</span>
        </div>
        <div class="stat">
          <span class="stat-value">48</span>
          <span class="stat-label">Projects</span>
        </div>
        <div class="stat">
          <span class="stat-value">100%</span>
          <span class="stat-label">On time</span>
        </div>
      </div>

      <!-- Skill badges -->
      <p class="badges-label">Skills</p>
      <div class="badges">
        <span class="badge blue">HTML</span>
        <span class="badge blue">CSS</span>
        <span class="badge green">JavaScript</span>
        <span class="badge purple">UI Design</span>
        <span class="badge orange">Freelancing</span>
        <span class="badge pink">Java</span>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button class="btn btn-primary">Hire Me</button>
        <button class="btn btn-outline">View Work</button>
      </div>

    </div>
  </div>

</body>
</html>
