<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day 287 - User Profile Card</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: #e2e8f0;
    }

    /* ── Card ── */
    .profile-card {
      width: 100%;
      max-width: 380px;
      background: #1e293b;
      border: 1px solid #263348;
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Cover Banner ── */
    .cover-banner {
      width: 100%;
      height: 110px;
      background: linear-gradient(135deg, #0ea5e9, #818cf8);
      position: relative;
      flex-shrink: 0;
    }

    /* Subtle pattern overlay */
    .cover-banner::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 18px 18px;
    }

    /* ── Avatar Area ── */
    .avatar-area {
      padding: 0 24px;
      position: relative;
      margin-top: -44px;
      margin-bottom: 4px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .avatar-wrap {
      position: relative;
      width: 88px;
      height: 88px;
      flex-shrink: 0;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      border: 4px solid #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: 800;
      color: #0f172a;
    }

    /* Online indicator */
    .status-dot {
      position: absolute;
      bottom: 6px;
      right: 4px;
      width: 14px;
      height: 14px;
      background: #34d399;
      border-radius: 50%;
      border: 3px solid #1e293b;
    }

    /* Follow button in avatar row */
    .btn-follow {
      padding: 9px 22px;
      background: #38bdf8;
      color: #0f172a;
      font-size: 0.82rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
      margin-bottom: 6px;
    }

    .btn-follow:hover {
      background: #0ea5e9;
      transform: translateY(-1px);
    }

    /* ── Body ── */
    .card-body {
      padding: 12px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* Name + Role */
    .profile-name {
      font-size: 1.15rem;
      font-weight: 800;
      color: #f8fafc;
      letter-spacing: -0.01em;
    }

    .profile-role {
      font-size: 0.82rem;
      color: #38bdf8;
      font-weight: 600;
      margin-top: 3px;
    }

    .profile-location {
      font-size: 0.78rem;
      color: #475569;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Bio */
    .profile-bio {
      font-size: 0.85rem;
      color: #64748b;
      line-height: 1.7;
    }

    /* ── Stats Row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      background: #0f172a;
      border-radius: 12px;
      border: 1px solid #1e293b;
      overflow: hidden;
    }

    .stat-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px 8px;
      gap: 4px;
      position: relative;
    }

    .stat-cell:not(:last-child)::after {
      content: '';
      position: absolute;
      right: 0;
      top: 20%;
      height: 60%;
      width: 1px;
      background: #1e293b;
    }

    .stat-number {
      font-size: 1.15rem;
      font-weight: 800;
      color: #f8fafc;
      letter-spacing: -0.02em;
    }

    .stat-label {
      font-size: 0.72rem;
      color: #475569;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ── Divider ── */
    .card-divider {
      border: none;
      border-top: 1px solid #263348;
    }

    /* ── Skills ── */
    .skills-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #475569;
      margin-bottom: -6px;
    }

    .skills-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .skill-badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 999px;
      border: 1px solid;
    }

    .skill-badge.blue   { background: rgba(56,189,248,0.08);  color: #38bdf8;  border-color: rgba(56,189,248,0.2);  }
    .skill-badge.purple { background: rgba(167,139,250,0.08); color: #a78bfa;  border-color: rgba(167,139,250,0.2); }
    .skill-badge.green  { background: rgba(52,211,153,0.08);  color: #34d399;  border-color: rgba(52,211,153,0.2);  }
    .skill-badge.orange { background: rgba(251,146,60,0.08);  color: #fb923c;  border-color: rgba(251,146,60,0.2);  }
    .skill-badge.pink   { background: rgba(244,114,182,0.08); color: #f472b6;  border-color: rgba(244,114,182,0.2); }
    .skill-badge.teal   { background: rgba(45,212,191,0.08);  color: #2dd4bf;  border-color: rgba(45,212,191,0.2);  }

    /* ── Action Buttons ── */
    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn-message {
      padding: 10px;
      background: transparent;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #94a3b8;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
    }

    .btn-message:hover {
      background: #1e293b;
      color: #f1f5f9;
      border-color: #38bdf8;
    }

    .btn-hire {
      padding: 10px;
      background: #38bdf8;
      border: none;
      border-radius: 8px;
      color: #0f172a;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
      text-align: center;
    }

    .btn-hire:hover {
      background: #0ea5e9;
      transform: translateY(-1px);
    }

    /* ── Social Links ── */
    .social-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .social-link {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: #0f172a;
      border: 1px solid #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      text-decoration: none;
      color: #475569;
      transition: all 0.2s ease;
    }

    .social-link:hover {
      background: #1e293b;
      color: #38bdf8;
      border-color: #38bdf8;
    }
  </style>
</head>
<body>

  <div class="profile-card">

    <!-- Cover Banner -->
    <div class="cover-banner"></div>

    <!-- Avatar + Follow -->
    <div class="avatar-area">
      <div class="avatar-wrap">
        <div class="avatar">SK</div>
        <span class="status-dot"></span>
      </div>
      <button class="btn-follow">+ Follow</button>
    </div>

    <!-- Card Body -->
    <div class="card-body">

      <!-- Name, Role, Location -->
      <div>
        <p class="profile-name">Subham Kumar</p>
        <p class="profile-role">Frontend Developer & UI Engineer</p>
        <p class="profile-location">📍 Odisha, India</p>
      </div>

      <!-- Bio -->
      <p class="profile-bio">
        Building clean, fast, and accessible interfaces. Passionate about design systems, SaaS products, and turning great ideas into real products.
      </p>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-cell">
          <span class="stat-number">286</span>
          <span class="stat-label">Projects</span>
        </div>
        <div class="stat-cell">
          <span class="stat-number">4.9★</span>
          <span class="stat-label">Rating</span>
        </div>
        <div class="stat-cell">
          <span class="stat-number">12K</span>
          <span class="stat-label">Followers</span>
        </div>
      </div>

      <hr class="card-divider" />

      <!-- Skills -->
      <p class="skills-label">Skills</p>
      <div class="skills-wrap">
        <span class="skill-badge blue">HTML</span>
        <span class="skill-badge purple">CSS</span>
        <span class="skill-badge green">Java</span>
        <span class="skill-badge orange">DSA</span>
        <span class="skill-badge pink">UI Design</span>
        <span class="skill-badge teal">Git</span>
      </div>

      <hr class="card-divider" />

      <!-- Action Buttons -->
      <div class="action-row">
        <button class="btn-message">💬 Message</button>
        <button class="btn-hire">🤝 Hire Me</button>
      </div>

      <!-- Social Links -->
      <div class="social-row">
        <a href="#" class="social-link" title="GitHub">⌥</a>
        <a href="#" class="social-link" title="LinkedIn">in</a>
        <a href="#" class="social-link" title="Twitter">𝕏</a>
        <a href="#" class="social-link" title="Portfolio">🌐</a>
      </div>

    </div>
  </div>

</body>
</html>
