<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 258 Portfolio Hero</title>

  <style>
    :root {
      --bg: #020617;
      --surface: #0f172a;
      --border: #1e293b;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }

    .hero-container {
      max-width: 1100px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 60px;
      flex-wrap: wrap;
    }

    .hero-content {
      flex: 1 1 500px;
    }

    .hero-content h1 {
      font-size: 2.8rem;
      line-height: 1.2;
      margin-bottom: 20px;
    }

    .hero-content span {
      color: var(--accent);
    }

    .hero-content p {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 30px;
      max-width: 500px;
    }

    .buttons {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      display: inline-block;
      transition: background 0.2s ease;
    }

    .btn-primary {
      background: var(--accent);
      color: #020617;
    }

    .btn-secondary {
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-secondary:hover {
      background: var(--surface);
    }

    .hero-image {
      flex: 1 1 350px;
      display: flex;
      justify-content: center;
    }

    .profile-card {
      width: 280px;
      height: 280px;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: var(--muted);
    }

    @media (max-width: 768px) {
      .hero-content h1 {
        font-size: 2rem;
      }

      .hero-container {
        text-align: center;
      }

      .hero-image {
        order: -1;
      }
    }
  </style>
</head>

<body>
  <section class="hero">
    <div class="hero-container">

      <div class="hero-content">
        <h1>Hello, I'm <span>Subham</span></h1>
        <p>
          I build responsive, modern web interfaces using clean HTML and CSS.
          Focused on performance, clarity, and structured design systems.
        </p>

        <div class="buttons">
          <a href="#" class="btn btn-primary">View Projects</a>
          <a href="#" class="btn btn-secondary">Contact Me</a>
        </div>
      </div>

      <div class="hero-image">
        <div class="profile-card">
          Profile Image
        </div>
      </div>

    </div>
  </section>
</body>
</html>
