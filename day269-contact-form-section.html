<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 269 Contact Form Section</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #020617;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .contact-section {
      width: 100%;
      max-width: 700px;
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 32px;
    }

    .contact-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .contact-header h1 {
      font-size: 28px;
      margin-bottom: 6px;
    }

    .contact-header p {
      font-size: 14px;
      color: #94a3b8;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 18px;
    }

    label {
      font-size: 13px;
      margin-bottom: 6px;
      color: #cbd5e1;
    }

    input,
    textarea {
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid #1e293b;
      background: #020617;
      color: #e2e8f0;
      font-size: 14px;
      resize: none;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: #38bdf8;
    }

    textarea {
      min-height: 120px;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      background: #38bdf8;
      color: #020617;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }

    .submit-btn:hover {
      background: #0ea5e9;
    }

  </style>
</head>

<body>

  <section class="contact-section">

    <div class="contact-header">
      <h1>Contact Us</h1>
      <p>Send us a message and we will get back to you</p>
    </div>

    <form>

      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Enter your name">
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email">
      </div>

      <div class="form-group">
        <label for="subject">Subject</label>
        <input type="text" id="subject" placeholder="Enter subject">
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" placeholder="Write your message"></textarea>
      </div>

      <button class="submit-btn">Send Message</button>

    </form>

  </section>

</body>
</html>
