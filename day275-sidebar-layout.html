<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 275 Sidebar Layout</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #020617;
      color: #e2e8f0;
      height: 100vh;
    }

    .layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      height: 100vh;
    }

    /* Sidebar */

    .sidebar {
      background: #0f172a;
      border-right: 1px solid #1e293b;
      padding: 20px;

      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .sidebar h2 {
      font-size: 18px;
      color: #38bdf8;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .nav a {
      text-decoration: none;
      color: #cbd5e1;
      font-size: 14px;
      padding: 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .nav a:hover {
      background: #1e293b;
    }

    /* Main Content */

    .main {
      padding: 20px;
    }

    .header {
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 22px;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 14px;
      color: #94a3b8;
    }

    .content {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 20px;
      min-height: 300px;
    }

    /* Responsive */

    @media (max-width: 768px) {

      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        flex-direction: row;
        overflow-x: auto;
      }

      .nav {
        flex-direction: row;
        gap: 16px;
      }

    }

  </style>
</head>

<body>

  <div class="layout">

    <aside class="sidebar">
      <h2>Dashboard</h2>

      <nav class="nav">
        <a href="#">Overview</a>
        <a href="#">Analytics</a>
        <a href="#">Users</a>
        <a href="#">Settings</a>
      </nav>
    </aside>

    <main class="main">

      <div class="header">
        <h1>Welcome Back</h1>
        <p>Here is your dashboard overview</p>
      </div>

      <div class="content">
        Main content area
      </div>

    </main>

  </div>

</body>
</html>
