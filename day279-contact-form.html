<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day 279 - Contact Form</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: #e2e8f0;
    }

    /* Section Header */
    .section-header {
      text-align: center;
      margin-bottom: 48px;
    }

    .section-header .tag {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #38bdf8;
      margin-bottom: 12px;
    }

    .section-header h2 {
      font-size: 2rem;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 10px;
    }

    .section-header p {
      font-size: 0.95rem;
      color: #64748b;
      max-width: 460px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* Card Wrapper */
    .form-card {
      background: #1e293b;
      border: 1px solid #263348;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 640px;
    }

    /* Two column row */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    /* Form Group */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

    .form-group:last-of-type {
      margin-bottom: 0;
    }

    label {
      font-size: 0.82rem;
      font-weight: 600;
      color: #94a3b8;
      letter-spacing: 0.03em;
    }

    /* Required star */
    label .req {
      color: #f87171;
      margin-left: 3px;
    }

    /* Input & Textarea base */
    input,
    textarea,
    select {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.9rem;
      color: #f1f5f9;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      appearance: none;
    }

    input::placeholder,
    textarea::placeholder {
      color: #475569;
    }

    /* Focus state */
    input:focus,
    textarea:focus,
    select:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.12);
    }

    /* Valid state */
    input:not(:placeholder-shown):valid {
      border-color: #34d399;
    }

    /* Textarea */
    textarea {
      resize: vertical;
      min-height: 130px;
      line-height: 1.6;
    }

    /* Select arrow */
    .select-wrapper {
      position: relative;
    }

    .select-wrapper::after {
      content: '▾';
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
      pointer-events: none;
      font-size: 0.9rem;
    }

    select option {
      background: #1e293b;
      color: #f1f5f9;
    }

    /* Divider */
    .form-divider {
      border: none;
      border-top: 1px solid #263348;
      margin: 24px 0;
    }

    /* Submit Button */
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #38bdf8;
      color: #0f172a;
      font-size: 0.95rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    .submit-btn:hover {
      background: #0ea5e9;
      transform: translateY(-1px);
    }

    .submit-btn:active {
      transform: translateY(0px);
    }

    /* Bottom note */
    .form-note {
      text-align: center;
      font-size: 0.78rem;
      color: #475569;
      margin-top: 16px;
    }

    .form-note a {
      color: #38bdf8;
      text-decoration: none;
    }

    .form-note a:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 580px) {
      .form-row {
        grid-template-columns: 1fr;
      }

      .form-card {
        padding: 28px 20px;
      }

      .section-header h2 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>

  <div class="section-header">
    <span class="tag">Contact Us</span>
    <h2>Get In Touch</h2>
    <p>Have a question or want to work together? Fill out the form and we'll get back to you within 24 hours.</p>
  </div>

  <div class="form-card">
    <form>

      <!-- Row: Name + Email -->
      <div class="form-row">
        <div class="form-group">
          <label for="name">Full Name <span class="req">*</span></label>
          <input
            type="text"
            id="name"
            placeholder="Subham Das"
            required
          />
        </div>

        <div class="form-group">
          <label for="email">Email Address <span class="req">*</span></label>
          <input
            type="email"
            id="email"
            placeholder="you@example.com"
            required
          />
        </div>
      </div>

      <!-- Subject Dropdown -->
      <div class="form-group">
        <label for="subject">Subject <span class="req">*</span></label>
        <div class="select-wrapper">
          <select id="subject" required>
            <option value="" disabled selected>Select a topic</option>
            <option value="general">General Inquiry</option>
            <option value="support">Technical Support</option>
            <option value="billing">Billing Question</option>
            <option value="partnership">Partnership Opportunity</option>
            <option value="other">Other</option>
          </select>
        </div>
      </div>

      <!-- Message -->
      <div class="form-group">
        <label for="message">Message <span class="req">*</span></label>
        <textarea
          id="message"
          placeholder="Write your message here..."
          required
        ></textarea>
      </div>

      <hr class="form-divider" />

      <!-- Submit -->
      <button type="submit" class="submit-btn">Send Message →</button>

    </form>

    <p class="form-note">
      By submitting, you agree to our <a href="#">Privacy Policy</a> and <a href="#">Terms of Service</a>.
    </p>
  </div>

</body>
</html>
