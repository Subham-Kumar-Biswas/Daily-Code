<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 274 Hero Section</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #020617;
      color: #e2e8f0;
      min-height: 100vh;
    }

    .hero {
      max-width: 1100px;
      margin: auto;
      padding: 80px 20px;

      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 40px;
      flex-wrap: wrap;
    }

    .hero-content {
      flex: 1;
      min-width: 280px;
    }

    .hero-content h1 {
      font-size: 42px;
      line-height: 1.2;
      margin-bottom: 16px;
      color: #ffffff;
    }

    .hero-content p {
      font-size: 15px;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 18px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: #38bdf8;
      color: #020617;
    }

    .btn-primary:hover {
      background: #0ea5e9;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #334155;
      color: #cbd5e1;
    }

    .btn-outline:hover {
      background: #1e293b;
    }

    .hero-image {
      flex: 1;
      min-width: 280px;
      height: 260px;
      background: #1e293b;
      border-radius: 12px;

      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .hero-content h1 {
        font-size: 32px;
      }

      .hero {
        padding: 60px 20px;
      }
    }

  </style>
</head>

<body>

  <section class="hero">

    <div class="hero-content">
      <h1>Build Modern Web Products Faster</h1>

      <p>
        Create scalable, high-performance applications with clean UI components and powerful tools designed for developers and startups.
      </p>

      <div class="hero-actions">
        <button class="btn btn-primary">Get Started</button>
        <button class="btn btn-outline">Learn More</button>
      </div>
    </div>

    <div class="hero-image">
      Image / Illustration
    </div>

  </section>

</body>
</html>
