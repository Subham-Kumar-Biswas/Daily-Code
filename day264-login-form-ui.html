<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day 264 Login Form</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        min-height: 100vh;
        background: #0f172a;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #e2e8f0;
        padding: 20px;
      }

      .login-container {
        width: 100%;
        max-width: 380px;
        background: #020617;
        border: 1px solid #1e293b;
        border-radius: 12px;
        padding: 32px;
      }

      .login-header {
        text-align: center;
        margin-bottom: 28px;
      }

      .login-header h1 {
        font-size: 24px;
        margin-bottom: 6px;
      }

      .login-header p {
        font-size: 13px;
        color: #94a3b8;
      }

      .form-group {
        margin-bottom: 18px;
        display: flex;
        flex-direction: column;
      }

      label {
        font-size: 13px;
        margin-bottom: 6px;
        color: #cbd5e1;
      }

      input {
        padding: 10px 12px;
        border-radius: 6px;
        border: 1px solid #1e293b;
        background: #0f172a;
        color: #e2e8f0;
        font-size: 14px;
      }

      input:focus {
        outline: none;
        border-color: #38bdf8;
      }

      .options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 12px;
        margin-bottom: 20px;
      }

      .options a {
        color: #38bdf8;
        text-decoration: none;
      }

      .options a:hover {
        text-decoration: underline;
      }

      .login-btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 6px;
        background: #38bdf8;
        color: #020617;
        font-size: 14px;
        cursor: pointer;
        font-weight: 600;
      }

      .login-btn:hover {
        background: #0ea5e9;
      }

      .signup {
        margin-top: 20px;
        text-align: center;
        font-size: 13px;
        color: #94a3b8;
      }

      .signup a {
        color: #38bdf8;
        text-decoration: none;
      }

      .signup a:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div class="login-container">
      <div class="login-header">
        <h1>Login</h1>
        <p>Access your account</p>
      </div>

      <form>
        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="Enter your email" />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Enter your password" />
        </div>

        <div class="options">
          <label> <input type="checkbox" /> Remember me </label>

          <a href="#">Forgot password?</a>
        </div>

        <button class="login-btn">Sign In</button>
      </form>

      <div class="signup">
        Don't have an account? <a href="#">Create one</a>
      </div>
    </div>
  </body>
</html>
