<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day 265 Profile Card</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #020617;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        color: #e2e8f0;
      }

      .profile-card {
        width: 320px;
        background: #0f172a;
        border: 1px solid #1e293b;
        border-radius: 14px;
        padding: 28px;
        text-align: center;
      }

      .avatar {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: #38bdf8;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: 700;
        color: #020617;
        margin: 0 auto 16px auto;
      }

      .name {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .role {
        font-size: 13px;
        color: #94a3b8;
        margin-bottom: 16px;
      }

      .bio {
        font-size: 14px;
        color: #cbd5e1;
        line-height: 1.5;
        margin-bottom: 20px;
      }

      .actions {
        display: flex;
        gap: 10px;
        justify-content: center;
      }

      .btn {
        padding: 8px 14px;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
        border: none;
      }

      .btn-primary {
        background: #38bdf8;
        color: #020617;
      }

      .btn-primary:hover {
        background: #0ea5e9;
      }

      .btn-outline {
        background: transparent;
        border: 1px solid #334155;
        color: #cbd5e1;
      }

      .btn-outline:hover {
        background: #1e293b;
      }
    </style>
  </head>

  <body>
    <div class="profile-card">
      <div class="avatar">JD</div>

      <div class="name">John Doe</div>
      <div class="role">Frontend Developer</div>

      <p class="bio">
        Passionate about building modern web applications and crafting clean
        user interfaces.
      </p>

      <div class="actions">
        <button class="btn btn-primary">Message</button>
        <button class="btn btn-outline">Follow</button>
      </div>
    </div>
  </body>
</html>
